<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Navigatore Camion Professionale</title>

<!-- Leaflet -->

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>

html,
body{
    margin:0;
    padding:0;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    display:flex;
    flex-direction:column;
    background:#f2f2f2;
}

#controlli{

    background:#2c3e50;

    color:white;

    padding:15px;

    box-shadow:0 2px 10px rgba(0,0,0,.3);

    z-index:999;

}

input{

    width:100%;

    box-sizing:border-box;

    padding:10px;

    margin-bottom:10px;

    border-radius:5px;

    border:none;

    font-size:15px;

}

button{

    width:100%;

    padding:12px;

    border:none;

    border-radius:5px;

    background:#e67e22;

    color:white;

    cursor:pointer;

    font-weight:bold;

    font-size:16px;

}

button:hover{

    background:#d35400;

}

#mappa{

    flex:1;

}

#risultato{

    margin-top:15px;

    font-size:18px;

    font-weight:bold;

    color:#f1c40f;

    text-align:center;

}

</style>

</head>

<body>

<div id="controlli">

<input
type="text"
id="partenza"
placeholder="Partenza"
value="Milano">

<input
type="text"
id="arrivo"
placeholder="Arrivo"
value="Roma">


<button onclick="calcolaPercorso()">

Calcola Percorso Camion

</button>


<button onclick="pulisciMappa()"
style="margin-top:10px;background:#c0392b">

Cancella percorso

</button>


<div id="risultato"></div>

</div>


<div id="mappa"></div>


<script>

/****************************************************
                CONFIGURAZIONE
****************************************************/

const TOMTOM_KEY = "scdR7UxKrzFdQO9ZC5i5qyYZrgmRVmUK";

/****************************************************
                MAPPA
****************************************************/

const map = L.map("mappa").setView([42.5,12.5],6);

L.tileLayer(

"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",

{

attribution:"© OpenStreetMap contributors"

}

).addTo(map);

let markerPartenza=null;

let markerArrivo=null;

let percorsoLayer=null;

/****************************************************
            GEOCODING TOMTOM
****************************************************/

async function geocoding(indirizzo){

const url=

`https://api.tomtom.com/search/2/geocode/${encodeURIComponent(indirizzo)}.json?key=${TOMTOM_KEY}&limit=1`;

const risposta=await fetch(url);

if(!risposta.ok){

throw new Error("Errore Geocoding");

}

const dati=await risposta.json();

if(!dati.results.length){

throw new Error("Località non trovata");

}

return{

lat:dati.results[0].position.lat,

lon:dati.results[0].position.lon

};

}
/****************************************************
            ROUTING CAMION TOMTOM
****************************************************/

async function calcolaPercorso(){

const risultato = document.getElementById("risultato");

const partenza =
document.getElementById("partenza").value.trim();

const arrivo =
document.getElementById("arrivo").value.trim();


if(!partenza || !arrivo){

    risultato.innerText =
    "Inserisci partenza e arrivo.";

    return;

}


if(
TOMTOM_KEY === "" ||
TOMTOM_KEY === "INSERISCI_LA_TUA_API_KEY"
){

    alert("Inserisci la tua API Key TomTom nel codice.");

    return;

}


try{


risultato.innerText =
"Ricerca località...";


/****************************************************
            COORDINATE PARTENZA
****************************************************/

const puntoPartenza =
await geocoding(partenza);


/****************************************************
            COORDINATE ARRIVO
****************************************************/

const puntoArrivo =
await geocoding(arrivo);



risultato.innerText =
"Calcolo percorso camion...";



/****************************************************
            ROUTING API TOMTOM
****************************************************/


const urlRouting =

`https://api.tomtom.com/routing/1/calculateRoute/${puntoPartenza.lat},${puntoPartenza.lon}:${puntoArrivo.lat},${puntoArrivo.lon}/json?key=${TOMTOM_KEY}&travelMode=truck&vehicleMaxSpeed=90&vehicleWeight=18000&vehicleHeight=4`;


const rispostaRouting =
await fetch(urlRouting);


if(!rispostaRouting.ok){

throw new Error(
"Errore nel calcolo percorso"
);

}


const datiRouting =
await rispostaRouting.json();

if(
!datiRouting.routes ||
datiRouting.routes.length===0
){

risultato.innerText =
"Nessun percorso trovato per camion.";

return;

}



/****************************************************
            DATI PERCORSO
****************************************************/


const route =
datiRouting.routes[0];


const distanzaKm =
(
route.summary.lengthInMeters / 1000
).toFixed(1);

const secondi =
route.summary.travelTimeInSeconds;


const ore =
Math.floor(secondi / 3600);


const minuti =
Math.round(
(secondi % 3600) / 60
);



risultato.innerText =

`🚚 ${distanzaKm} km - Tempo stimato ${ore}h ${minuti}min`;

/****************************************************
            RIMOZIONE VECCHIO PERCORSO
****************************************************/


if(percorsoLayer){

map.removeLayer(percorsoLayer);

}


if(markerPartenza){

map.removeLayer(markerPartenza);

}


if(markerArrivo){

map.removeLayer(markerArrivo);

}
/****************************************************
            MARKER
****************************************************/


markerPartenza = L.marker(

[
puntoPartenza.lat,
puntoPartenza.lon
]

)

.addTo(map)

.bindPopup(
"Partenza: " + partenza
);



markerArrivo = L.marker(
[
puntoArrivo.lat,
puntoArrivo.lon
]

)

.addTo(map)

.bindPopup(
"Arrivo: " + arrivo
);



/****************************************************
            LINEA PERCORSO
****************************************************/


let punti=[];


/*
TomTom restituisce una lista di coordinate
nella forma:
latitude / longitude
*/


if(
route.legs &&
route.legs.length>0
){


route.legs.forEach(leg=>{


if(leg.points){


leg.points.forEach(p=>{


punti.push([

p.latitude,

p.longitude

]);
});


}


});


}



if(punti.length===0){

throw new Error(
"Nessuna geometria percorso ricevuta"
);

}



percorsoLayer =
L.polyline(

punti,

{

color:"#e67e22",

weight:6,

opacity:0.9

}

)

.addTo(map);



map.fitBounds(
percorsoLayer.getBounds()
);
}

catch(errore){


console.error(errore);


risultato.innerText =
"Errore: " + errore.message;


}


}
/****************************************************
        FUNZIONI EXTRA E SICUREZZA
****************************************************/


// Mostra un messaggio temporaneo nella console
function infoSistema(){

console.log(
"Navigatore camion TomTom avviato correttamente"
);

}


/****************************************************
        SUPPORTO GEOMETRIA TOMTOM ALTERNATIVA
****************************************************/

function estraiPuntiPercorso(route){

let punti=[];


/*
Alcune risposte TomTom possono contenere
la geometria codificata nella sezione legs
oppure direttamente in guidance.
*/


if(route.legs){

route.legs.forEach(leg=>{

if(leg.points){

leg.points.forEach(p=>{

punti.push([

p.latitude,

p.longitude

]);

});

}

});

}



/*
Fallback per alcune versioni API
*/


if(
punti.length===0 &&
route.guidance &&
route.guidance.instructions
){

console.log(
"Geometria alternativa disponibile"
);

}


return punti;

}



/****************************************************
        PULIZIA MAPPA
****************************************************/

function pulisciMappa(){


if(percorsoLayer){

map.removeLayer(percorsoLayer);

percorsoLayer=null;

}


if(markerPartenza){

map.removeLayer(markerPartenza);

markerPartenza=null;

}


if(markerArrivo){

map.removeLayer(markerArrivo);

markerArrivo=null;

}


document.getElementById("risultato").innerText =
"Percorso cancellato";


}



/****************************************************
        AVVIO
****************************************************/

infoSistema();

</script>

</body>

</html>
