<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigatore Camion TomTom</title>
    <!-- Mappa Standard OpenSource (Non scade mai) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #controlli { padding: 15px; background: #2c3e50; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 1000; }
        #mappa { flex-grow: 1; width: 100%; }
        input { width: 95%; padding: 8px; margin-bottom: 8px; border: none; border-radius: 4px; }
        button { background: #e67e22; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; font-size: 1em; }
        #risultato { margin-top: 12px; font-size: 1.1em; font-weight: bold; color: #f1c40f; text-align: center; }
    </style>
</head>
<body>

    <div id="controlli">
        <input type="text" id="partenza" placeholder="Inserisci partenza (es. Milano)" value="Milano">
        <input type="text" id="arrivo" placeholder="Inserisci arrivo (es. Roma)" value="Roma">
        <button onclick="calcolaPercorsoTomTom()">Calcola Percorso Camion con TomTom</button>
        <div id="risultato"></div>
    </div>

    <div id="mappa"></div>

    <script>
        // METTI QUI LA TUA API KEY DI TOMTOM
        const TOMTOM_KEY = "scdR7UxKrzFdQO9ZC5i5qyYZrgmRVmUK"; 

        // Inizializza la mappa Leaflet sull'Italia
        const map = L.map('mappa').setView([42.5, 12.5], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let stratoPercorso = null;

        // Funzione per cercare le coordinate usando le API HTTP stabili di TomTom
        async function cercaCoordinate(testo) {
            const url = `https://tomtom.com{encodeURIComponent(testo)}.json?key=${TOMTOM_KEY}&limit=1`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.results && data.results.length > 0) {
                const pos = data.results[0].position;
                return [pos.lat, pos.lon]; // Ritorna [Lat, Lon]
            }
            throw new Error("Indirizzo non trovato: " + testo);
        }

        async function calcolaPercorsoTomTom() {
            const divRisultato = document.getElementById('risultato');
            divRisultato.innerText = "Calcolo in corso con parametri camion...";

            try {
                const p1 = await cercaCoordinate(document.getElementById('partenza').value);
                const p2 = await cercaCoordinate(document.getElementById('arrivo').value);

                // Richiesta di routing HTTP stabile per CAMION
                const urlRouting = `https://tomtom.com{p1[0]},${p1[1]}:${p2[0]},${p2[1]}/json?key=${TOMTOM_KEY}&travelMode=truck&vehicleMaxSpeed=90&vehicleWeight=18000&vehicleHeight=4.0`;
                
                const response = await fetch(urlRouting);
                const data = await response.json();

                if (data.routes && data.routes.length > 0) {
                    const route = data.routes[0];
                    
                    // Estrae distanza e tempo ricalcolati per camion
                    const distanzaKm = (route.summary.lengthInMeters / 1000).toFixed(1);
                    const oreTotali = route.summary.travelTimeInSeconds / 3600;
                    const ore = Math.floor(oreTotali);
                    const minuti = Math.round((oreTotali - ore) * 60);

                    divRisultato.innerText = `🚚 TomTom Camion: ${distanzaKm} km | Tempo: ${ore}h ${minuti}min`;

                    // Rimuove il vecchio disegno se presente
                    if (stratoPercorso) { map.removeLayer(stratoPercorso); }

                    // Estrae i punti stradali per disegnare la linea
                    const puntiLinea = [];
                    route.legs.forEach(leg => {
                        leg.points.forEach(pt => {
                            puntiLinea.push([pt.latitude, pt.longitude]);
                        });
                    });

                    // Disegna il percorso arancione sulla mappa
                    stratoPercorso = L.polyline(puntiLinea, {color: '#e67e22', weight: 6}).addTo(map);
                    map.fitBounds(stratoPercorso.getBounds());
                } else {
                    divRisultato.innerText = "Nessun percorso trovato per questi parametri.";
                }

            } catch (error) {
                divRisultato.innerText = "Errore durante il calcolo.";
                alert(error.message);
            }
        }
    </script>
</body>
</html>
