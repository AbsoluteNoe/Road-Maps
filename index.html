<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Navigatore Camion Professionale</title>

<!-- Leaflet -->

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>

html,
body{
    margin:0;
    padding:0;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    display:flex;
    flex-direction:column;
    background:#f2f2f2;
}

#modalMezzo{
    display:flex;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:3000;
}

#contenitoreModal{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 6px rgba(0,0,0,.1);
    text-align:center;
}

#contenitoreModal h2{
    margin-top:0;
    color:#2c3e50;
}

#controlli{

    background:#2c3e50;

    color:white;

    padding:15px;

    box-shadow:0 2px 10px rgba(0,0,0,.3);

    z-index:999;

    position:relative;

    transition: transform 0.3s ease;

}

#controlli.collapsed{
    transform: translateY(-100%);
}

#toggleButton{
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    background: #2c3e50;
    color: white;
    border: none;
    padding: 8px 16px;
    font-size: 20px;
    cursor: pointer;
    z-index: 1000;
    border-radius: 0 0 8px 8px;
    transition: background 0.3s ease;
    display: none;
    pointer-events: auto;
}

#toggleButton:hover{
    background: #1a252f;
}

.campo-wrapper{

    position:relative;

    margin-bottom:10px;

}

input{

    width:100%;

    box-sizing:border-box;

    padding:10px;

    border-radius:5px;

    border:none;

    font-size:15px;

}

.suggerimenti{

    position:absolute;

    top:100%;

    left:0;

    right:0;

    background:white;

    color:#2c3e50;

    border-radius:0 0 5px 5px;

    max-height:220px;

    overflow-y:auto;

    box-shadow:0 4px 10px rgba(0,0,0,.4);

    z-index:1500;

}

.suggerimento{

    padding:10px;

    cursor:pointer;

    border-bottom:1px solid #ecf0f1;

}

.suggerimento:hover{

    background:#ecf0f1;

}

.container-bottoni{

    display:flex;

    gap:10px;

    margin-top:10px;

}

.btn{

    flex:1;

    padding:10px;

    border:none;

    border-radius:5px;

    font-size:15px;

    cursor:pointer;

    font-weight:bold;

    transition:background 0.3s;

}

.btn-calcola{

    background:#27ae60;

    color:white;

}

.btn-calcola:hover{

    background:#229954;

}

.btn-cancella{

    background:#e74c3c;

    color:white;

}

.btn-cancella:hover{

    background:#c0392b;

}

#mappa{

    flex:1;

    position:relative;

}

#infoPannello{

    background:white;

    padding:10px 15px;

    box-shadow:0 -2px 10px rgba(0,0,0,.2);

    color:#2c3e50;

    font-size:14px;

    line-height:1.6;

}

.info-riga{

    margin:5px 0;

}

.info-etichetta{

    font-weight:bold;

}

#legenda{

    position:absolute;

    bottom:20px;

    right:20px;

    background:white;

    padding:15px;

    border-radius:5px;

    box-shadow:0 2px 10px rgba(0,0,0,.2);

    z-index:500;

    font-size:12px;

}

.legenda-riga{

    display:flex;

    align-items:center;

    gap:8px;

    margin:5px 0;

}

.legenda-colore{

    width:20px;

    height:3px;

}

</style>

</head>

<body>

<div id="modalMezzo" style="display:none;">
    <div id="contenitoreModal">
        <h2>Seleziona il Mezzo</h2>
        <button onclick="scegli('AutoPicccola', 120)">Auto Piccola (120 km/h)</button>
        <button onclick="scegli('AutoGrande', 100)">Auto Grande (100 km/h)</button>
        <button onclick="scegli('Camion', 80)">Camion (80 km/h)</button>
        <button onclick="scegli('Furgone', 100)">Furgone (100 km/h)</button>
    </div>
</div>

<div id="toggleButton" onclick="toggleControls(event)">▼</div>

<div id="controlli">

    <h3>Navigatore Camion Professionale</h3>

    <div class="campo-wrapper">
        <input type="text" id="partenza" placeholder="Dove vuoi partire?" autocomplete="off">
        <div class="suggerimenti" id="suggerentiPartenza"></div>
    </div>

    <div class="campo-wrapper">
        <input type="text" id="arrivo" placeholder="Dove vuoi andare?" autocomplete="off">
        <div class="suggerimenti" id="suggerentiArrivo"></div>
    </div>

    <div class="container-bottoni">
        <button class="btn btn-calcola" onclick="calcolaPercorso()">Calcola Percorso</button>
        <button class="btn btn-cancella" onclick="cancellaPercorso()">Cancella Percorso</button>
    </div>

</div>

<div id="mappa"></div>

<div id="infoPannello">

    <div class="info-riga">
        <span class="info-etichetta">Distanza:</span>
        <span id="infoDistanza">-</span>
    </div>

    <div class="info-riga">
        <span class="info-etichetta">Tempo stimato:</span>
        <span id="infoTempo">-</span>
    </div>

    <div class="info-riga">
        <span class="info-etichetta">Velocità media:</span>
        <span id="infoVelocita">-</span>
    </div>

    <div class="info-riga">
        <span class="info-etichetta">Mezzo selezionato:</span>
        <span id="infoMezzo">-</span>
    </div>

</div>

<div id="legenda">
    <div class="legenda-riga">
        <div class="legenda-colore" style="background:blue;"></div>
        <span>Percorso calcolato</span>
    </div>
    <div class="legenda-riga">
        <div class="legenda-colore" style="background:green;"></div>
        <span>Partenza</span>
    </div>
    <div class="legenda-riga">
        <div class="legenda-colore" style="background:red;"></div>
        <span>Arrivo</span>
    </div>
</div>

<script>

let mappa = L.map('mappa').setView([41.8719, 12.5674], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(mappa);

let marcatori = [];
let polyline = null;
let mezziDisponibili = {
    'AutoPicccola': 120,
    'AutoGrande': 100,
    'Camion': 80,
    'Furgone': 100
};
let mezzoSelezionato = null;
let velocitaMezzo = null;
let inNavigazione = false;

async function cercaIndirizzi(query, elementoSuggerimenti) {
    if (query.length < 3) {
        elementoSuggerimenti.innerHTML = '';
        return;
    }

    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&countrycodes=it`);
        const risultati = await response.json();

        elementoSuggerimenti.innerHTML = '';

        if (risultati.length === 0) {
            elementoSuggerimenti.innerHTML = '<div class="suggerimento">Nessun risultato trovato</div>';
            return;
        }

        risultati.forEach(risultato => {
            const div = document.createElement('div');
            div.className = 'suggerimento';
            div.textContent = risultato.display_name;
            div.onclick = () => selezionaIndirizzo(risultato, elementoSuggerimenti.id === 'suggerentiPartenza' ? 'partenza' : 'arrivo');
            elementoSuggerimenti.appendChild(div);
        });
    } catch (error) {
        console.error('Errore nella ricerca:', error);
    }
}

function selezionaIndirizzo(risultato, tipo) {
    document.getElementById(tipo).value = risultato.display_name;
    document.getElementById(tipo === 'partenza' ? 'suggerentiPartenza' : 'suggerentiArrivo').innerHTML = '';
}

document.getElementById('partenza').addEventListener('input', (e) => {
    cercaIndirizzi(e.target.value, document.getElementById('suggerentiPartenza'));
});

document.getElementById('arrivo').addEventListener('input', (e) => {
    cercaIndirizzi(e.target.value, document.getElementById('suggerentiArrivo'));
});

async function calcolaPercorso() {
    const partenza = document.getElementById('partenza').value;
    const arrivo = document.getElementById('arrivo').value;

    if (!partenza || !arrivo) {
        alert('Compila sia il campo partenza che il campo arrivo');
        return;
    }

    if (!mezzoSelezionato) {
        document.getElementById('modalMezzo').style.display = 'flex';
        return;
    }

    inNavigazione = true;

    try {
        const geocodingPartenza = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(partenza)}&format=json&limit=1&countrycodes=it`);
        const datiPartenza = await geocodingPartenza.json();

        const geocodingArrivo = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(arrivo)}&format=json&limit=1&countrycodes=it`);
        const datiArrivo = await geocodingArrivo.json();

        if (datiPartenza.length === 0 || datiArrivo.length === 0) {
            alert('Uno o entrambi gli indirizzi non sono stati trovati');
            inNavigazione = false;
            return;
        }

        const latPartenza = datiPartenza[0].lat;
        const lonPartenza = datiPartenza[0].lon;
        const latArrivo = datiArrivo[0].lat;
        const lonArrivo = datiArrivo[0].lon;

        const osrmResponse = await fetch(`https://router.project-osrm.org/route/v1/driving/${lonPartenza},${latPartenza};${lonArrivo},${latArrivo}?overview=full&geometries=geojson`);
        const datiOsrm = await osrmResponse.json();

        if (datiOsrm.routes.length === 0) {
            alert('Percorso non trovato');
            inNavigazione = false;
            return;
        }

        pulisciMarcatori();

        const coordinate = datiOsrm.routes[0].geometry.coordinates;
        const latLngArray = coordinate.map(coord => [coord[1], coord[0]]);

        polyline = L.polyline(latLngArray, {
            color: 'blue',
            weight: 4,
            opacity: 0.7
        }).addTo(mappa);

        const marcatorePartenza = L.marker([latPartenza, lonPartenza], {
            icon: L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41]
            })
        }).addTo(mappa).bindPopup(`Partenza: ${partenza}`);
        marcatori.push(marcatorePartenza);

        const marcatoreArrivo = L.marker([latArrivo, lonArrivo], {
            icon: L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41]
            })
        }).addTo(mappa).bindPopup(`Arrivo: ${arrivo}`);
        marcatori.push(marcatoreArrivo);

        mappa.fitBounds(polyline.getBounds().pad(0.1));

        const distanza = datiOsrm.routes[0].distance / 1000;
        const durata = datiOsrm.routes[0].duration / 3600;
        const velocitaMedia = distanza / durata;

        document.getElementById('infoDistanza').textContent = `${distanza.toFixed(1)} km`;
        document.getElementById('infoTempo').textContent = `${durata.toFixed(2)} ore`;
        document.getElementById('infoVelocita').textContent = `${velocitaMedia.toFixed(1)} km/h - Limite: ${velocitaMezzo} km/h`;
        document.getElementById('infoMezzo').textContent = mezzoSelezionato;

        document.getElementById('controlli').classList.add('collapsed');
        document.getElementById('toggleButton').style.display = 'block';
        document.getElementById('toggleButton').textContent = '▲';

    } catch (error) {
        console.error('Errore:', error);
        alert('Errore nel calcolo del percorso');
        inNavigazione = false;
    }
}

function cancellaPercorso() {
    pulisciMarcatori();
    if (polyline) {
        mappa.removeLayer(polyline);
        polyline = null;
    }
    document.getElementById('infoDistanza').textContent = '-';
    document.getElementById('infoTempo').textContent = '-';
    document.getElementById('infoVelocita').textContent = '-';
    document.getElementById('infoMezzo').textContent = '-';
    document.getElementById('partenza').value = '';
    document.getElementById('arrivo').value = '';
    document.getElementById('controlli').classList.remove('collapsed');
    document.getElementById('toggleButton').style.display = 'none';
    document.getElementById('toggleButton').textContent = '▼';
    inNavigazione = false;
}

function pulisciMarcatori() {
    marcatori.forEach(marcatore => {
        mappa.removeLayer(marcatore);
    });
    marcatori = [];
}

function scegli(mezzo, velocita) {
    mezzoSelezionato = mezzo;
    velocitaMezzo = velocita;
    document.getElementById('modalMezzo').style.display = 'none';
    calcolaPercorso();
}

function toggleControls(event) {
    event.stopPropagation();
    const controlli = document.getElementById('controlli');
    const toggleButton = document.getElementById('toggleButton');

    controlli.classList.toggle('collapsed');

    if (controlli.classList.contains('collapsed')) {
        toggleButton.textContent = '▲';
    } else {
        toggleButton.textContent = '▼';
    }
}

</script>

</body>

</html>
