<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigatore Camion Professionale</title>
    <!-- Mappa Standard OpenSource -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #controlli { padding: 15px; background: #2c3e50; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 1000; }
        #mappa { flex-grow: 1; width: 100%; min-height: 300px; background: #eee; }
        input { width: 95%; padding: 8px; margin-bottom: 8px; border: none; border-radius: 4px; }
        button { background: #e67e22; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; font-size: 1em; }
        #risultato { margin-top: 12px; font-size: 1.1em; font-weight: bold; color: #f1c40f; text-align: center; }
    </style>
</head>
<body>

    <div id="controlli">
        <input type="text" id="partenza" placeholder="Inserisci partenza (es. Milano)" value="Milano">
        <input type="text" id="arrivo" placeholder="Inserisci arrivo (es. Roma)" value="Roma">
        <button onclick="calcolaPercorsoTomTom()">Calcola Percorso Camion</button>
        <div id="risultato"></div>
    </div>

    <div id="mappa"></div>

    <script>
        // METTI QUI LA TUA API KEY DI TOMTOM MANTENENDO LE VIRGOLETTE
        const TOMTOM_KEY = "scdR7UxKrzFdQO9ZC5i5qyYZrgmRVmUK"; 

        // 1. Inizializza la mappa Leaflet
        const map = L.map('mappa').setView([42.5, 12.5], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let stratoPercorso = null;

        async function calcolaPercorsoTomTom() {
            const divRisultato = document.getElementById('risultato');
            const partenzaTesto = document.getElementById('partenza').value;
            const arrivoTesto = document.getElementById('arrivo').value;
            
            if (TOMTOM_KEY === "LA_TUA_API_KEY_TOMTOM" || TOMTOM_KEY === "") {
                alert("Inserisci la tua chiave TomTom reale riga 33!");
                return;
            }

            divRisultato.innerText = "Connessione sicura tramite Proxy CORS...";

            try {
                // Usiamo il proxy AllOrigins che aggira i blocchi di GitHub sui server esterni
                const proxy = "https://allorigins.win";

                // 1. Cerca Coordinate Partenza passate dentro il proxy
                const urlP1 = `https://tomtom.com{encodeURIComponent(partenzaTesto)}.json?key=${TOMTOM_KEY}&limit=1`;
                const resP1 = await fetch(proxy + encodeURIComponent(urlP1));
                const dataP1 = await resP1.json();
                
                if (!dataP1.results || dataP1.results.length === 0) {
                    divRisultato.innerText = "Località di partenza non trovata.";
                    return;
                }
                const lat1 = dataP1.results[0].position.lat;
                const lon1 = dataP1.results[0].position.lon;

                // 2. Cerca Coordinate Arrivo passate dentro il proxy
                const urlP2 = `https://tomtom.com{encodeURIComponent(arrivoTesto)}.json?key=${TOMTOM_KEY}&limit=1`;
                const resP2 = await fetch(proxy + encodeURIComponent(urlP2));
                const dataP2 = await resP2.json();
                
                if (!dataP2.results || dataP2.results.length === 0) {
                    divRisultato.innerText = "Località di arrivo non trovata.";
                    return;
                }
                const lat2 = dataP2.results[0].position.lat;
                const lon2 = dataP2.results[0].position.lon;

                divRisultato.innerText = "Calcolo percorso camion (TomTom)...";

                // 3. Richiesta di Calcolo Percorso Camion passata dentro il proxy
                const urlRouting = `https://tomtom.com{lat1},${lon1}:${lat2},${lon2}/json?key=${TOMTOM_KEY}&travelMode=truck&vehicleMaxSpeed=90&vehicleWeight=18000&vehicleHeight=4.0`;
                const resRouting = await fetch(proxy + encodeURIComponent(urlRouting));
                const dataRouting = await resRouting.json();

                if (dataRouting.routes && dataRouting.routes.length > 0) {
                    const percorso = dataRouting.routes[0];
                    
                    const distanzaKm = (percorso.summary.lengthInMeters / 1000).toFixed(1);
                    const oreTotali = percorso.summary.travelTimeInSeconds / 3600;
                    const ore = Math.floor(oreTotali);
                    const minuti = Math.round((oreTotali - ore) * 60);

                    divRisultato.innerText = `🚚 Camion: ${distanzaKm} km | Tempo TomTom: ${ore}h ${minuti}min`;

                    if (stratoPercorso) { map.removeLayer(stratoPercorso); }

                    const puntiLinea = [];
                    percorso.legs.forEach(leg => {
                        leg.points.forEach(pt => {
                            puntiLinea.push([pt.latitude, pt.longitude]);
                        });
                    });

                    stratoPercorso = L.polyline(puntiLinea, {color: '#e67e22', weight: 6}).addTo(map);
                    map.fitBounds(stratoPercorso.getBounds());
                } else {
                    divRisultato.innerText = "Nessun percorso stradale trovato per mezzi pesanti.";
                }

            } catch (error) {
                divRisultato.innerText = "Errore di connessione.";
                alert("Dettaglio errore sbloccato dal proxy: " + error.message);
            }
        }
    </script>
</body>
</html>
