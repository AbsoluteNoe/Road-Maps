<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Navigatore Camion Professionale</title>

<!-- Leaflet -->

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>

html,
body{
    margin:0;
    padding:0;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    display:flex;
    flex-direction:column;
    background:#f2f2f2;
}

#modalMezzo{
    display:flex;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:3000;
}

#contenitoreModal{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 6px rgba(0,0,0,.1);
    text-align:center;
}

#contenitoreModal h2{
    margin-top:0;
    color:#2c3e50;
}

#controlli{

    background:#2c3e50;

    color:white;

    padding:15px;

    box-shadow:0 2px 10px rgba(0,0,0,.3);

    z-index:999;

    position:relative;

    transition: transform 0.3s ease;

}

#controlli.collapsed{
    transform: translateY(-100%);
}

#toggleButton{
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    background: #2c3e50;
    color: white;
    border: none;
    padding: 8px 16px;
    font-size: 20px;
    cursor: pointer;
    z-index: 1000;
    border-radius: 0 0 8px 8px;
    transition: background 0.3s ease;
    display: none;
}

#toggleButton:hover{
    background: #34495e;
}

#toggleButton.show{
    display: block;
}

#mapa{

    flex:1;

}

.input-group {
    margin-bottom: 10px;
}

.input-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

.input-group input {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

button {
    background: #27ae60;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    margin-right: 10px;
}

button:hover {
    background: #229954;
}

button.reset {
    background: #c0392b;
}

button.reset:hover {
    background: #a93226;
}

.controllo-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.controllo-row .input-group {
    flex: 1;
    margin-bottom: 0;
}

.controllo-row .input-group input {
    width: 100%;
}

.controllo-col {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.info-bar {
    background: #ecf0f1;
    color: #2c3e50;
    padding: 10px;
    border-radius: 4px;
    margin-top: 10px;
    font-size: 14px;
    display: none;
}

.info-bar.show {
    display: block;
}

</style>

</head>

<body>

<div id="controlli">
    <div class="controllo-row">
        <div class="input-group">
            <label for="partenza">Partenza</label>
            <input type="text" id="partenza" placeholder="Inserisci partenza">
        </div>
        <div class="input-group">
            <label for="arrivo">Arrivo</label>
            <input type="text" id="arrivo" placeholder="Inserisci arrivo">
        </div>
    </div>
    <div class="controllo-row">
        <div class="input-group">
            <label for="mezzo">Seleziona Mezzo</label>
            <input type="text" id="mezzo" placeholder="Clicca per selezionare mezzo" readonly>
        </div>
    </div>
    <div class="controllo-col">
        <button id="calcola">Calcola Percorso</button>
        <button id="cancella" class="reset">Cancella Percorso</button>
    </div>
    <div id="infoBar" class="info-bar"></div>
</div>

<button id="toggleButton"></button>

<div id="mapa"></div>

<div id="modalMezzo" style="display:none;">
    <div id="contenitoreModal">
        <h2>Seleziona il Mezzo</h2>
        <div id="mezziContainer"></div>
    </div>
</div>

<script>

const mezzi = {
    'Autoarticolato': 90,
    'Trattore Stradale': 90,
    'Autobus': 100,
    'Camion Leggero': 110,
};

let map;
let routing;
let currentRoute;
let currentMezzo = null;
let selectedControl = 'partenza';
let isNavigating = false;

function initMap() {
    map = L.map('mapa').setView([41.871940, 12.567380], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function searchLocation(location) {
    return fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`)
        .then(r => r.json());
}

async function calcolaPercorso() {
    const partenza = document.getElementById('partenza').value;
    const arrivo = document.getElementById('arrivo').value;

    if (!partenza || !arrivo || !currentMezzo) {
        alert('Compila tutti i campi');
        return;
    }

    isNavigating = true;
    showToggleButton();

    try {
        const [startResults, endResults] = await Promise.all([
            searchLocation(partenza),
            searchLocation(arrivo),
        ]);

        if (startResults.length === 0 || endResults.length === 0) {
            alert('Ubicazioni non trovate');
            isNavigating = false;
            hideToggleButton();
            return;
        }

        const start = [parseFloat(startResults[0].lat), parseFloat(startResults[0].lon)];
        const end = [parseFloat(endResults[0].lat), parseFloat(endResults[0].lon)];

        const routeUrl = `https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;

        const routeResponse = await fetch(routeUrl);
        const routeData = await routeResponse.json();

        if (routeData.routes && routeData.routes.length > 0) {
            const route = routeData.routes[0];
            const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
            const distance = (route.distance / 1000).toFixed(2);
            const duration = (route.duration / 3600).toFixed(2);

            map.fitBounds(L.polyline(coords).getBounds());

            if (currentRoute) {
                map.removeLayer(currentRoute);
            }

            currentRoute = L.polyline(coords, { color: 'red', weight: 3 }).addTo(map);

            const speedLimit = mezzi[currentMezzo];
            const info = `Distanza: ${distance} km | Tempo stimato: ${duration} ore | Velocità massima: ${speedLimit} km/h`;
            document.getElementById('infoBar').textContent = info;
            document.getElementById('infoBar').classList.add('show');

        } else {
            alert('Percorso non trovato');
            isNavigating = false;
            hideToggleButton();
        }
    } catch (error) {
        console.error('Errore:', error);
        alert('Errore nel calcolo del percorso');
        isNavigating = false;
        hideToggleButton();
    }
}

function cancella() {
    if (currentRoute) {
        map.removeLayer(currentRoute);
        currentRoute = null;
    }
    document.getElementById('partenza').value = '';
    document.getElementById('arrivo').value = '';
    document.getElementById('mezzo').value = '';
    currentMezzo = null;
    document.getElementById('infoBar').classList.remove('show');
    isNavigating = false;
    hideToggleButton();
}

function showToggleButton() {
    document.getElementById('toggleButton').classList.add('show');
    updateToggleButton();
}

function hideToggleButton() {
    document.getElementById('toggleButton').classList.remove('show');
    document.getElementById('controlli').classList.remove('collapsed');
}

function updateToggleButton() {
    const isCollapsed = document.getElementById('controlli').classList.contains('collapsed');
    document.getElementById('toggleButton').textContent = isCollapsed ? '▲' : '▼';
}

function toggleControls(e) {
    e.stopPropagation();
    document.getElementById('controlli').classList.toggle('collapsed');
    updateToggleButton();
}

document.getElementById('partenza').addEventListener('click', () => {
    selectedControl = 'partenza';
    document.getElementById('mappa').click();
});

document.getElementById('arrivo').addEventListener('click', () => {
    selectedControl = 'arrivo';
    document.getElementById('mappa').click();
});

document.getElementById('mezzo').addEventListener('click', () => {
    document.getElementById('modalMezzo').style.display = 'flex';
});

document.getElementById('calcola').addEventListener('click', calcolaPercorso);
document.getElementById('cancella').addEventListener('click', cancella);
document.getElementById('toggleButton').addEventListener('click', toggleControls);

const modal = document.getElementById('modalMezzo');

modal.addEventListener('click', (e) => {
    if (e.target === modal) {
        modal.style.display = 'none';
    }
});

function setupMezzi() {
    const container = document.getElementById('mezziContainer');
    for (const [mezzo, speed] of Object.entries(mezzi)) {
        const btn = document.createElement('button');
        btn.textContent = `${mezzo} (${speed} km/h)`;
        btn.addEventListener('click', () => {
            currentMezzo = mezzo;
            document.getElementById('mezzo').value = mezzo;
            modal.style.display = 'none';
        });
        container.appendChild(btn);
    }
}

initMap();
setupMezzi();

</script>

</body>

</html>
