<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigatore Mezzi Pesanti</title>
    <!-- Mappa Standard OpenSource -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #controlli { padding: 15px; background: #2c3e50; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 1000; }
        #mappa { flex-grow: 1; width: 100%; min-height: 300px; background: #eee; }
        input { width: 95%; padding: 8px; margin-bottom: 8px; border: none; border-radius: 4px; }
        button { background: #e67e22; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 5px; font-weight: bold; width: 100%; font-size: 1em; }
        #risultato { margin-top: 12px; font-size: 1.1em; font-weight: bold; color: #f1c40f; text-align: center; }
    </style>
</head>
<body>

    <div id="controlli">
        <input type="text" id="partenza" placeholder="Partenza (es. Milano)" value="Milano">
        <input type="text" id="arrivo" placeholder="Arrivo (es. Roma)" value="Roma">
        <button onclick="calcolaPercorsoLibero()">Calcola Percorso Camion</button>
        <div id="risultato"></div>
    </div>

    <div id="mappa"></div>

    <script>
        // Inizializza la mappa Leaflet sull'Italia
        const map = L.map('mappa').setView([42.5, 12.5], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let stratoPercorso = null;

        // Funzione pubblica per cercare le coordinate senza chiavi
        async function ottieniCoordinate(testo) {
            const url = `https://openstreetmap.org{encodeURIComponent(testo)}&limit=1`;
            const res = await fetch(url, { headers: { 'User-Agent': 'NavigatoreCamionApp' } });
            const data = await res.json();
            if (data && data.length > 0) {
                return [parseFloat(data[0].lon), parseFloat(data[0].lat)];
            }
            throw new Error("Località non trovata: " + testo);
        }

        async function calcolaPercorsoLibero() {
            const divRisultato = document.getElementById('risultato');
            divRisultato.innerText = "Ricerca in corso...";

            try {
                // Trova le coordinate di partenza e arrivo
                const p1 = await ottieniCoordinate(document.getElementById('partenza').value);
                const p2 = await ottieniCoordinate(document.getElementById('arrivo').value);

                divRisultato.innerText = "Calcolo percorso stradale...";

                // Interroga il server pubblico OSRM (Senza necessità di chiavi o autenticazioni)
                const urlRouting = `https://project-osrm.org{p1[0]},${p1[1]};${p2[0]},${p2[1]}?overview=full&geometries=geojson`;
                const resRouting = await fetch(urlRouting);
                const dataRouting = await resRouting.json();

                if (dataRouting.routes && dataRouting.routes.length > 0) {
                    const percorso = dataRouting.routes[0];
                    
                    // Calcolo Distanza standard
                    const distanzaKm = (percorso.distance / 1000).toFixed(1);
                    
                    // APPLICAZIONE DEI LIMITI CAMION:
                    // Moltiplichiamo il tempo delle auto per un coefficiente correttivo medio (1.35) 
                    // per simulare l'andamento reale di un mezzo pesante bloccato a 80-90 km/h in autostrada
                    const tempoAutoSecondi = percorso.duration;
                    const tempoCamionSecondi = tempoAutoSecondi * 1.35; 
                    
                    const oreTotali = tempoCamionSecondi / 3600;
                    const ore = Math.floor(oreTotali);
                    const minuti = Math.round((oreTotali - ore) * 60);

                    divRisultato.innerText = `🚚 Camion: ${distanzaKm} km | Tempo stimato: ${ore}h ${minuti}min`;

                    if (stratoPercorso) { map.removeLayer(stratoPercorso); }

                    // Inverte l'ordine delle coordinate GeoJSON per adattarle a Leaflet
                    const puntiLinea = percorso.geometry.coordinates.map(coord => [coord[1], coord[0]]);

                    // Disegna la strada sulla mappa
                    stratoPercorso = L.polyline(puntiLinea, {color: '#e67e22', weight: 6}).addTo(map);
                    map.fitBounds(stratoPercorso.getBounds());
                } else {
                    divRisultato.innerText = "Nessun percorso trovato.";
                }

            } catch (error) {
                divRisultato.innerText = "Errore durante il calcolo.";
                alert(error.message);
            }
        }
    </script>
</body>
</html>
