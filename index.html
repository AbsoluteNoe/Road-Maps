<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Navigatore Camion Professionale</title>

<!-- Leaflet -->

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">

<style>

html,
body{
    margin:0;
    padding:0;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    display:flex;
    flex-direction:column;
    background:#f2f2f2;
}

#modalMezzo{
    display:flex;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:3000;
}

#contenitoreModal{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    text-align:center;
    max-width:500px;
}

#contenitoreModal h2{
    color:#2c3e50;
    margin-bottom:20px;
    font-size:24px;
}

#contenitoreModal p{
    color:#666;
    margin-bottom:30px;
    font-size:16px;
}

.grid-mezzi{
    display:grid;
grid-template-columns:1fr;
    gap:12px;
    margin-bottom:20px;
}

.grid-mezzi button{
padding:25px;
    font-size:15px;
    background:#ecf0f1;
    color:#2c3e50;
    border:2px solid #bdc3c7;
    border-radius:8px;
    cursor:pointer;
    transition:all 0.3s ease;
    font-weight:bold;
    text-align:left;
}

.grid-mezzi button:hover{
    background:#3498db;
    color:white;
    border-color:#3498db;
transform:scale(1.02);
}

.grid-mezzi button.attivo{
    background:#e67e22;
    color:white;
    border-color:#e67e22;
}

.limite-info{
    font-size:12px;
    margin-top:8px;
    opacity:0.8;
}

#controlli{

    background:#2c3e50;

    color:white;

    padding:15px;

    box-shadow:0 2px 10px rgba(0,0,0,.3);

    z-index:999;

    position:relative;

}

.campo-wrapper{

    position:relative;

    margin-bottom:10px;

}

input{

    width:100%;

    box-sizing:border-box;

    padding:10px;

    border-radius:5px;

    border:none;

    font-size:15px;

}

.suggerimenti{

    position:absolute;

    top:100%;

    left:0;

    right:0;

    background:white;

    color:#2c3e50;

    border-radius:0 0 5px 5px;

    max-height:220px;

    overflow-y:auto;

    box-shadow:0 4px 10px rgba(0,0,0,.4);

    z-index:1500;

    display:none;

}

.suggerimenti div{

    padding:10px;

    cursor:pointer;

    border-bottom:1px solid #eee;

    font-size:14px;

    line-height:1.3;

}

.suggerimenti div:last-child{

    border-bottom:none;

}

.suggerimenti div:hover,
.suggerimenti div.attivo{

    background:#f1c40f;

}

.suggerimenti .nome-luogo{

    font-weight:bold;

    display:block;

}

.suggerimenti .indirizzo-luogo{

    font-size:12px;

    color:#666;

}

button{

    width:100%;

    padding:12px;

    border:none;

    border-radius:5px;

    background:#e67e22;

    color:white;

    cursor:pointer;

    font-weight:bold;

    font-size:16px;

    margin-top:10px;

}

button:hover{

    background:#d35400;

}

button:disabled{

    background:#7f8c8d;

    cursor:not-allowed;

}

#mappa{

    flex:1;

    position:relative;

}

#risultato{

    margin-top:15px;

    font-size:18px;

    font-weight:bold;

    color:#f1c40f;

    text-align:center;

}

#infoMezzo{

    padding:10px;

    background:#27ae60;

    color:white;

    text-align:center;

    font-weight:bold;

    font-size:14px;

    border-radius:5px;

    margin-bottom:10px;

}

/****************************************************
        STILE MARKER FRECCIA DIREZIONE (GPS)
****************************************************/

.freccia-navigazione{

    width:40px;

    height:40px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:30px;

    color:#2980ff;

    text-shadow:

        -1px -1px 0 #fff,

        1px -1px 0 #fff,

        -1px 1px 0 #fff,

        1px 1px 0 #fff,

        0 0 6px rgba(0,0,0,.4);

    transition:transform 0.25s linear;

    transform-origin:50% 50%;

}

/****************************************************
        PANNELLO NAVIGAZIONE (STILE GOOGLE MAPS)
****************************************************/

#pannelloNavigazione{

    display:none;

    position:fixed;

    left:0;

    right:0;

    bottom:0;

    background:#1b1f27;

    color:white;

    padding:15px;

    box-shadow:0 -4px 15px rgba(0,0,0,.4);

    z-index:2000;

}

.riga-principale{

    display:flex;

    align-items:center;

    gap:12px;

}

.icona-manovra{

    font-size:34px;

    min-width:46px;

    text-align:center;

}

.testo-istruzione{

    flex:1;

}

.messaggio-nav{

    font-size:18px;

    font-weight:bold;

}

.distanza-nav{

    font-size:14px;

    color:#f1c40f;

    margin-top:2px;

}

.strada-attuale{

    margin-top:8px;

    font-size:13px;

    color:#bbb;

}

.riga-info{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-top:10px;

    font-size:14px;

    color:#ddd;

}

#limiteMezzoP{

    font-weight:bold;

    color:#ff6b6b;

    text-align:center;

    flex:1;

}

.btn-termina{

    margin-top:12px;

    background:#c0392b;

}

.btn-termina:hover{

    background:#962d22;

}

#btnCentra{

    display:none;

    position:fixed;

    right:15px;

    bottom:230px;

    width:50px;

    height:50px;

    border-radius:50%;

    background:#2980ff;

    color:white;

    font-size:22px;

    box-shadow:0 2px 10px rgba(0,0,0,.4);

    z-index:2001;

    padding:0;

    margin:0;

}

</style>

</head>

<body>

<!-- MODAL SELEZIONE MEZZO -->

<div id="modalMezzo">

    <div id="contenitoreModal">

        <h2>Seleziona il tuo mezzo</h2>

        <p>Scegli il tipo di veicolo per ottenere i limiti di velocità corretti</p>

        <div class="grid-mezzi">
		<button onclick="selezionaMezzo('fino12','Autocarri 3,5-12 tonnellate')">
                	🚛 Autocarri 3,5-12 tonnellate

           	</button>
		<button onclick="selezionaMezzo('oltre12','Autocarri oltre 12 tonnellate (anche autotreni, autoarticolati)')">
                	🚚 Autocarri oltre 12 tonnellate<br>(anche autotreni, autoarticolati)
                	<div class="limite-info">Centro: 50 km/h | Extraurbane: 70 km/h | Autostrada: 80 km/h</div>
           	</button>
		<button onclick="selezionaMezzo('autobus','Autobus > 8 tonnellate')">

                <div class="limite-info">Centro: 50 km/h | Extraurbane: 80 km/h | Autostrada: 100 km/h</div>
            </button>

        </div>

    </div>

</div>

<div id="controlli">

<div id="infoMezzo"></div>

<div class="campo-wrapper">

<input
type="text"
id="partenza"
placeholder="Partenza (indirizzo, azienda, luogo...)"
value=""
autocomplete="off">

<div class="suggerimenti" id="suggerimenti-partenza"></div>

</div>


<div class="campo-wrapper">

<input
type="text"
id="arrivo"
placeholder="Arrivo (indirizzo, azienda, luogo...)"
value=""
autocomplete="off">

<div class="suggerimenti" id="suggerimenti-arrivo"></div>

</div>


<button onclick="calcolaPercorso()">

Calcola Percorso Camion

</button>


<button id="btnAvviaNavigazione"
onclick="avviaNavigazione()"
style="background:#27ae60"
disabled>

🧭 Avvia Navigazione

</button>


<button onclick="pulisciMappa()"
style="background:#c0392b">

Cancella percorso

</button>

<button onclick="cambiaToMezzo()"
style="background:#9b59b6">

Cambia mezzo

</button>


<div id="risultato"></div>

</div>


<div id="mappa"></div>


<!-- Pannello di navigazione stile Google Maps -->

<div id="pannelloNavigazione">

<div class="riga-principale">

<div id="iconaManovra" class="icona-manovra">⬆️</div>

<div class="testo-istruzione">

<div id="messaggioNavigazione" class="messaggio-nav">

Prosegui dritto

</div>

<div id="distanzaManovra" class="distanza-nav"></div>

</div>

</div>

<div id="stradaAttuale" class="strada-attuale"></div>

<div class="riga-info">

<span id="velocitaAttuale">0 km/h</span>
<span id="limiteMezzoP">Limite camion: -- km/h</span>

<span id="infoRimanente"></span>

</div>

<button class="btn-termina" onclick="terminaNavigazione()">

✕ Termina navigazione

</button>

</div>


<!-- Pulsante per ricentrare la mappa sulla posizione -->

<button id="btnCentra" onclick="ricentraMappa()">🎯</button>


<script>

/****************************************************
                CONFIGURAZIONE
****************************************************/

const TOMTOM_KEY = "scdR7UxKrzFdQO9ZC5i5qyYZrgmRVmUK";

/****************************************************
      LIMITI DI VELOCITÀ PER TIPO DI MEZZO E STRADA
      SECONDO NORMATIVA ITALIANA
****************************************************/

const limitiVelocita = {
    fino12: {
        urbana: 50,
        extraurbana: 80,
        autostrada: 100
    },
    oltre12: {
        urbana: 50,
        extraurbana: 70,
        autostrada: 80
    },
    autobus: {
        urbana: 50,
        extraurbana: 80,
        autostrada: 100
    }
};

/****************************************************
          STATO MEZZO SELEZIONATO
****************************************************/

let mezzoSelezionato = {
    tipo: null,
nome: null
};

/****************************************************
                MAPPA
****************************************************/

const map = L.map("mappa").setView([42.5,12.5],6);

L.tileLayer(

"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",

{

attribution:"© OpenStreetMap contributors"

}

).addTo(map);

let markerPartenza=null;

let markerArrivo=null;

let percorsoLayer=null;

/****************************************************
        STATO SELEZIONE LUOGHI (autocomplete)
****************************************************/
const luoghiSelezionati = {

partenza:null,

arrivo:null

};

/****************************************************
        STATO PERCORSO E NAVIGAZIONE
****************************************************/
let puntiPercorso = [];
let istruzioni = [];
let indiceIstruzioneCorrente = 0;
let arrivoCorrente = null;
let navigazioneAttiva = false;
let watchIdNavigazione = null;
let markerPosizioneUtente = null;
let ultimaPosizioneGps = null;
let contatoreFuoriPercorso = 0;
let seguiPosizione = true;

const SOGLIA_RICALCOLO_METRI = 50;
const SOGLIA_AVANZAMENTO_METRI = 35;
const LETTURE_FUORI_PERCORSO_PER_RICALCOLO = 3;

/****************************************************
              UTILITY - FUNCTIONAL CLASS
****************************************************/

function getTipoStrada(functionalClass){
    if(!functionalClass) return "urbana";
    
    if(functionalClass === 1) return "autostrada";
    if(functionalClass === 2) return "extraurbana";
    if(functionalClass === 3 || functionalClass === 4) return "extraurbana";
    if(functionalClass === 5) return "urbana";
    
    return "urbana";
}

function getLimiteVelocita(tipoMezzo, tipoStrada){
    const limiti = limitiVelocita[tipoMezzo];
    return limiti ? limiti[tipoStrada] || 50 : 50;
}

/****************************************************
        SELEZIONE MEZZO
****************************************************/
function selezionaMezzo(tipo, nome){

    mezzoSelezionato.tipo = tipo;

    mezzoSelezionato.nome = nome;
// Nascondi modal
    document.getElementById("modalMezzo").style.display = "none";

    // Mostra info mezzo
    document.getElementById("infoMezzo").innerHTML = `
✓ Mezzo selezionato: <strong>${nome}</strong>
    `;

}

function cambiaToMezzo(){

    // Mostra modal
    document.getElementById("modalMezzo").style.display = "flex";

    // Reset interfaccia
    pulisciMappa();

}

/****************************************************
        GESTIONE AUTOCOMPLETE / SUGGERIMENTI
****************************************************/

const timerRicerca = {

partenza:null,

arrivo:null

};

function configuraAutocomplete(idCampo){

const input =
document.getElementById(idCampo);

const box =
document.getElementById("suggerimenti-" + idCampo);


input.addEventListener("input", () =>{


luoghiSelezionati[idCampo] = null;


const testo =
input.value.trim();


clearTimeout(
timerRicerca[idCampo]
);


if(testo.length < 3){

nascondiSuggerimenti(box);

return;

}


timerRicerca[idCampo] =
setTimeout(async () => {

await cercaSuggerimenti(
testo,
box,
input,
idCampo
);

},350);

});


document.addEventListener("click",(evento)=>{

if(
!box.contains(evento.target) &&
evento.target !== input
){

nascondiSuggerimenti(box);

}

});


input.addEventListener("keydown",(evento)=>{

const voci =
box.querySelectorAll("div");

if(!voci.length || box.style.display === "none"){

return;

}


let indiceAttivo = -1;

voci.forEach((voce,indice)=>{

if(voce.classList.contains("attivo")){

indiceAttivo = indice;

}

});


if(evento.key === "ArrowDown"){

evento.preventDefault();

indiceAttivo = (indiceAttivo + 1) % voci.length;

aggiornaEvidenza(voci,indiceAttivo);

}
else if(evento.key === "ArrowUp"){

evento.preventDefault();

indiceAttivo =
(indiceAttivo - 1 + voci.length) % voci.length;

aggiornaEvidenza(voci,indiceAttivo);

}
else if(evento.key === "Enter"){

if(indiceAttivo >= 0){

evento.preventDefault();

voci[indiceAttivo].click();

}

}
else if(evento.key === "Escape"){

nascondiSuggerimenti(box);

}

});

}

function aggiornaEvidenza(voci,indice){

voci.forEach(v=>v.classList.remove("attivo"));

voci[indice].classList.add("attivo");

voci[indice].scrollIntoView({block:"nearest"});

}

function nascondiSuggerimenti(box){

box.style.display = "none";

box.innerHTML = "";

}

async function cercaSuggerimenti(testo,box,input,idCampo){

try{

const url =

`https://api.tomtom.com/search/2/search/${encodeURIComponent(testo)}.json?key=${TOMTOM_KEY}&limit=6&countrySet=IT&idxSet=POI,Geo,Addr,Str`;

const risposta = await fetch(url);

if(!risposta.ok){

nascondiSuggerimenti(box);

return;

}

const dati = await risposta.json();

if(!dati.results || !dati.results.length){

box.innerHTML =
"<div style='cursor:default;color:#999'>Nessun risultato</div>";

box.style.display = "block";

return;

}

box.innerHTML = "";

dati.results.forEach(risultato=>{

const voce = document.createElement("div");

const nome =
risultato.poi ?
risultato.poi.name :
(risultato.address ?
risultato.address.freeformAddress :
"Luogo sconosciuto");

const indirizzoCompleto =
risultato.address ?
risultato.address.freeformAddress :
"";

voce.innerHTML =

`<span class="nome-luogo">${escapeHtml(nome)}</span>` +

(indirizzoCompleto && indirizzoCompleto !== nome ?
`<span class="indirizzo-luogo">${escapeHtml(indirizzoCompleto)}</span>` :
"");

voce.addEventListener("click",()=>{

input.value = nome;

luoghiSelezionati[idCampo] = {

lat: risultato.position.lat,

lon: risultato.position.lon,

etichetta: nome

};

nascondiSuggerimenti(box);

});

box.appendChild(voce);

});

box.style.display = "block";

}
catch(errore){

console.error(errore);

nascondiSuggerimenti(box);

}

}

function escapeHtml(testo){

const div = document.createElement("div");

div.innerText = testo;

return div.innerHTML;

}

/****************************************************
    GEOCODING / RICERCA LUOGO (fallback manuale)
****************************************************/

async function cercaLuogo(testo){

const url =

`https://api.tomtom.com/search/2/search/${encodeURIComponent(testo)}.json?key=${TOMTOM_KEY}&limit=1&countrySet=IT&idxSet=POI,Geo,Addr,Str`;

const risposta = await fetch(url);

if(!risposta.ok){

throw new Error("Errore ricerca luogo");

}

const dati = await risposta.json();

if(!dati.results || !dati.results.length){

throw new Error("Località non trovata: " + testo);

}

const primo = dati.results[0];

return{

lat: primo.position.lat,

lon: primo.position.lon

};

}

/****************************************************
    ESTRAZIONE ISTRUZIONI SVOLTA-PER-SVOLTA
****************************************************/

function estraiIstruzioni(route){

const lista = [];

if(route.guidance && route.guidance.instructions){

route.guidance.instructions.forEach(istr=>{

if(istr.point){

lista.push({

lat: istr.point.latitude,

lon: istr.point.longitude,

messaggio: istr.message || "Prosegui dritto",

manovra: istr.maneuver || "",
strada: istr.street || istr.signpostText || "",

functionalClass: istr.functionalClass

});

}

});

}

return lista;

}

/****************************************************
        FUNZIONE PULISCI MAPPA (MODIFICATA)
****************************************************/

function pulisciMappa(){

// Reset dei campi di testo
document.getElementById("partenza").value = "";

document.getElementById("arrivo").value = "";

// Reset dello stato selezioni
luoghiSelezionati.partenza = null;

luoghiSelezionati.arrivo = null;

// Reset della mappa
if(markerPartenza) map.removeLayer(markerPartenza);

if(markerArrivo) map.removeLayer(markerArrivo);

if(percorsoLayer) map.removeLayer(percorsoLayer);

markerPartenza = null;

markerArrivo = null;

percorsoLayer = null;

// Reset altre variabili
puntiPercorso = [];

istruzioni = [];

indiceIstruzioneCorrente = 0;

document.getElementById("risultato").innerText = "";

document.getElementById("btnAvviaNavigazione").disabled = true;

// Nascondi il pannello di navigazione se attivo
document.getElementById("pannelloNavigazione").style.display = "none";

navigazioneAttiva = false;

}

/****************************************************
             ROUTING CAMION TOMTOM
****************************************************/

async function calcolaPercorso(){

// Verifica che un mezzo sia stato selezionato
if(!mezzoSelezionato.tipo){

    alert("Seleziona prima un tipo di mezzo!");

    return;

}

const risultato = document.getElementById("risultato");

const inputPartenza =
document.getElementById("partenza");

const inputArrivo =
document.getElementById("arrivo");

const partenza = inputPartenza.value.trim();

const arrivo = inputArrivo.value.trim();


if(!partenza || !arrivo){

    risultato.innerText =
    "Inserisci partenza e arrivo.";

    return;

}


if(
TOMTOM_KEY === "" ||
TOMTOM_KEY === "INSERISCI_LA_TUA_API_KEY"
){

    alert("Inserisci la tua API Key TomTom nel codice.");

    return;

}


if(navigazioneAttiva){

terminaNavigazione();

}


document.getElementById("btnAvviaNavigazione").disabled = true;


try{


risultato.innerText =
"Ricerca località...";


const puntoPartenza =
luoghiSelezionati.partenza ?
luoghiSelezionati.partenza :
await cercaLuogo(partenza);


const puntoArrivo =
luoghiSelezionati.arrivo ?
luoghiSelezionati.arrivo :
await cercaLuogo(arrivo);



risultato.innerText =
"Calcolo percorso camion...";
// Usa un limite medio di 80 km/h per il calcolo del routing
const urlRouting =
`https://api.tomtom.com/routing/1/calculateRoute/${puntoPartenza.lat},${puntoPartenza.lon}:${puntoArrivo.lat},${puntoArrivo.lon}/json?key=${TOMTOM_KEY}&travelMode=truck&vehicleMaxSpeed=80&vehicleWidth=2.5&vehicleHeight=4&vehicleLength=17&vehicleWeight=20000&computeBestOrder=false&routeType=fastest&language=it-IT`;

const rispostaRouting = await fetch(urlRouting);

if(!rispostaRouting.ok){

throw new Error("Errore calcolo percorso");

}

const datiRouting = await rispostaRouting.json();

if(!datiRouting.routes || !datiRouting.routes.length){

throw new Error("Nessun percorso disponibile");

}

const route = datiRouting.routes[0];

puntiPercorso = route.legs.flatMap(gamba=>
gamba.points.map(p=>
[p.latitude,p.longitude]
)
);

istruzioni = estraiIstruzioni(route);

arrivoCorrente = puntoArrivo;

// Visualizza sulla mappa
const distanzaTotaleKm = Math.round(route.summary.lengthInMeters/1000);

const tempoTotaleMinuti = Math.round(route.summary.travelTimeInSeconds/60);

risultato.innerHTML = `
✓ Percorso trovato!<br>
Distanza: ${distanzaTotaleKm} km<br>
Tempo stimato: ${tempoTotaleMinuti} minuti
`;

// Marker partenza
markerPartenza = L.marker([puntoPartenza.lat, puntoPartenza.lon])
.bindPopup("Partenza")
.addTo(map);

// Marker arrivo
markerArrivo = L.marker([puntoArrivo.lat, puntoArrivo.lon])
.bindPopup("Arrivo")
.addTo(map);

// Polilinea percorso
percorsoLayer = L.polyline(puntiPercorso,{
color:"#e67e22",
weight:4,
opacity:0.8
}).addTo(map);

map.fitBounds(percorsoLayer.getBounds(),{padding:[50,50]});

document.getElementById("btnAvviaNavigazione").disabled = false;

}
catch(errore){

risultato.innerText = "Errore: " + errore.message;

console.error(errore);

}

}

/****************************************************
            AVVIA NAVIGAZIONE GPS
****************************************************/

function avviaNavigazione(){

if(!puntiPercorso.length){

alert("Calcola prima un percorso.");

return;

}

navigazioneAttiva = true;

indiceIstruzioneCorrente = 0;

document.getElementById("pannelloNavigazione").style.display = "block";

document.getElementById("btnCentra").style.display = "block";

if(navigator.geolocation){

watchIdNavigazione = navigator.geolocation.watchPosition(
aggiornaNavigazione,
err=>console.error(err),
{enableHighAccuracy:true, timeout:10000}
);

}else{

alert("Geolocalizzazione non disponibile");

}

}

/****************************************************
          AGGIORNAMENTO NAVIGAZIONE GPS
****************************************************/

function aggiornaNavigazione(posizione){

const coords = posizione.coords;

ultimaPosizioneGps = {
lat:coords.latitude,
lon:coords.longitude,
precisione:coords.accuracy
};

// Aggiorna marker posizione utente
if(!markerPosizioneUtente){

markerPosizioneUtente = L.marker([coords.latitude, coords.longitude],{
icon:L.divIcon({
className:"freccia-navigazione",
html:"⬆️"
})
}).addTo(map);

}else{

markerPosizioneUtente.setLatLng([coords.latitude, coords.longitude]);

}

// Centra mappa se seguiPosizione attivo
if(seguiPosizione){

map.setView([coords.latitude, coords.longitude],17);

}

// Controlla se fuori percorso
const distanzaMinima = Math.min(
...puntiPercorso.map(p=>
calcDistanza(coords.latitude, coords.longitude, p[0], p[1])
)
);

if(distanzaMinima > SOGLIA_RICALCOLO_METRI){

contatoreFuoriPercorso++;

if(contatoreFuoriPercorso >= LETTURE_FUORI_PERCORSO_PER_RICALCOLO){

console.log("Fuori percorso! Ricalcolo...");

ricalcolaPercorso();

}

}else{

contatoreFuoriPercorso = 0;

}

// Avanza istruzione se raggiunto il waypoint
if(istruzioni.length && indiceIstruzioneCorrente < istruzioni.length){

const istrCorrente = istruzioni[indiceIstruzioneCorrente];

const distanzaIstruzione = calcDistanza(
coords.latitude,
coords.longitude,
istrCorrente.lat,
istrCorrente.lon
);

if(distanzaIstruzione < SOGLIA_AVANZAMENTO_METRI){

indiceIstruzioneCorrente++;

}

}

// Aggiorna pannello
aggiornaPannelloNavigazione(coords);

}

/****************************************************
        AGGIORNA PANNELLO NAVIGAZIONE
****************************************************/

function aggiornaPannelloNavigazione(coords){

const pannello = document.getElementById("pannelloNavigazione");

if(indiceIstruzioneCorrente >= istruzioni.length){

pannello.innerHTML = `
<div style="text-align:center; font-size:20px; color:#f1c40f; font-weight:bold;">
✓ Destinazione raggiunta!
</div>
<button class="btn-termina" onclick="terminaNavigazione()">
✕ Chiudi
</button>
`;

return;

}

const istrCorrente = istruzioni[indiceIstruzioneCorrente];

const distanzaRimanente = istruzioni
.slice(indiceIstruzioneCorrente)
.reduce((sum,istr,i)=>{

if(i===0) return sum;

const prev = istruzioni[indiceIstruzioneCorrente + i - 1];

return sum + calcDistanza(prev.lat, prev.lon, istr.lat, istr.lon);

},0) + calcDistanza(coords.latitude, coords.longitude, istrCorrente.lat, istrCorrente.lon);

const velocita = Math.round(coords.speed * 3.6) || 0;
// Determina il tipo di strada dall'istruzione corrente
let tipoStrada = "urbana";

if(indiceIstruzioneCorrente < istruzioni.length){
    const fc = istruzioni[indiceIstruzioneCorrente].functionalClass;
    tipoStrada = getTipoStrada(fc);
}

const limiteCamion = getLimiteVelocita(mezzoSelezionato.tipo, tipoStrada);

document.getElementById("iconaManovra").innerText = getManovra(istrCorrente.manovra);

document.getElementById("messaggioNavigazione").innerText = istrCorrente.messaggio;

document.getElementById("distanzaManovra").innerText = distanzaRimanente < 1000 ? 
Math.round(distanzaRimanente) + " m" : 
(distanzaRimanente/1000).toFixed(1) + " km";

document.getElementById("stradaAttuale").innerText = "Strada: " + (istrCorrente.strada || "???");

document.getElementById("velocitaAttuale").innerText = velocita + " km/h";

document.getElementById("limiteMezzoP").innerText = "Limite: " + limiteCamion + " km/h";

document.getElementById("infoRimanente").innerText = arrivoCorrente ? "A: " + arrivoCorrente.etichetta : "";

}

function getManovra(manovra){

const mappe = {
"TURN_LEFT":"↙️",
"TURN_RIGHT":"↘️",
"TURN_SHARP_LEFT":"⬅️",
"TURN_SHARP_RIGHT":"➡️",
"TURN_SLIGHT_LEFT":"↖️",
"TURN_SLIGHT_RIGHT":"↗️",
"KEEP_LEFT":"↙️",
"KEEP_RIGHT":"↘️",
"GO_STRAIGHT":"⬆️",
"ROUNDABOUT_LEFT":"↙️",
"ROUNDABOUT_RIGHT":"↘️",
"FORK_LEFT":"↙️",
"FORK_RIGHT":"↘️"
};

return mappe[manovra] || "⬆️";

}

/****************************************************
          RICALCOLO PERCORSO DINAMICO
****************************************************/

async function ricalcolaPercorso(){

terminaNavigazione();

try{

const puntoPartenza = ultimaPosizioneGps;

const puntoArrivo = arrivoCorrente;

const urlRouting =
`https://api.tomtom.com/routing/1/calculateRoute/${puntoPartenza.lat},${puntoPartenza.lon}:${puntoArrivo.lat},${puntoArrivo.lon}/json?key=${TOMTOM_KEY}&travelMode=truck&vehicleMaxSpeed=80&vehicleWidth=2.5&vehicleHeight=4&vehicleLength=17&vehicleWeight=20000&routeType=fastest&language=it-IT`;

const rispostaRouting = await fetch(urlRouting);

const datiRouting = await rispostaRouting.json();

const route = datiRouting.routes[0];

puntiPercorso = route.legs.flatMap(gamba=>
gamba.points.map(p=>
[p.latitude,p.longitude]
)
);

istruzioni = estraiIstruzioni(route);

indiceIstruzioneCorrente = 0;

contatoreFuoriPercorso = 0;

// Aggiorna polilinea
if(percorsoLayer) map.removeLayer(percorsoLayer);

percorsoLayer = L.polyline(puntiPercorso,{
color:"#e67e22",
weight:4,
opacity:0.8
}).addTo(map);

// Riavvia navigazione
avviaNavigazione();

}
catch(errore){

console.error("Errore ricalcolo percorso:", errore);

}

}

/****************************************************
            TERMINA NAVIGAZIONE
****************************************************/

function terminaNavigazione(){

navigazioneAttiva = false;

if(watchIdNavigazione !== null){

navigator.geolocation.clearWatch(watchIdNavigazione);

watchIdNavigazione = null;

}

if(markerPosizioneUtente){

map.removeLayer(markerPosizioneUtente);

markerPosizioneUtente = null;

}

document.getElementById("pannelloNavigazione").style.display = "none";

document.getElementById("btnCentra").style.display = "none";

seguiPosizione = true;

}

/****************************************************
              FUNZIONI UTILITY
****************************************************/

function ricentraMappa(){

if(ultimaPosizioneGps){

map.setView([ultimaPosizioneGps.lat, ultimaPosizioneGps.lon],17);

}

}

function calcDistanza(lat1,lon1,lat2,lon2){

const R = 6371000; // raggio Terra in metri

const dLat = (lat2-lat1)*Math.PI/180;

const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)*Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}
